name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Dummy keys: Settings requires them at import, but `-m "not live"` runs
      # only mocked tests, so no real API calls are made (and no credits spent).
      OPENAI_API_KEY: sk-ci-dummy
      ANTHROPIC_API_KEY: sk-ant-ci-dummy
      JUDGE0_API_KEY: judge0-ci-dummy
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest -m "not live"
