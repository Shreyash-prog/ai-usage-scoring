# fly.toml app configuration file generated for ai-usage-scoring on 2026-06-10T22:13:14-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-usage-scoring'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/events.db'
  TASKS_DIR = '/app/tasks'
  TRUST_PROXY_HEADERS = 'true'

[[mounts]]
  source = 'ai_usage_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine warm: synchronous post-hoc scoring (and the candidate WS)
  # must survive idle periods — scale-to-zero would suspend the machine mid-session
  # and drop the socket. Trade-off: ~$2-5/mo always-on instead of near-zero idle.
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
